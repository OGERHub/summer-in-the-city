project:
  type: website
  output-dir: docs
  render:
    - "index.qmd"
    - "pages/*.qmd"

website:
  favicon: images/logo.png
  bread-crumbs: false
  open-graph: true
  page-navigation: true
  title: "Summer in the City"
  site-url: https://ogerhub.github.io/summer-in-the-city
  repo-url: https://github.com/ogerhub/summer-in-the-city
  repo-actions: [edit, issue]
  repo-branch: main
  search:
    location: sidebar
    type: textbox
  twitter-card:
    creator: "@gisma"
  comments: false

  navbar:
    background: primary
    foreground: light
    logo: images/logo.png

  sidebar:
    contents:
      - text: "Start"
        href: index.qmd

      - section: "Summer in the City"
        contents:
          - text: "Unterrichtsidee und Materialpaket"
            href: pages/lehrerhandreichung_inhaltlich.qmd

          - text: "Arbeitsseite für Lernende"
            href: pages/schuelerseite_lst_stadtklima.qmd

      - section: "Material selbst erstellen"
        contents:
          - text: "Technische Anleitung"
            href: pages/lehrerhandreichung_technisch.qmd

          - text: "Konfigurator"
            href: pages/konfigurator_lst_paket.qmd

execute:
  freeze: auto
  echo: false
  message: false
  warning: false
  cache: false

format:
  html:
    include-after-body: css/banner-footer.html
    include-in-header: css/banner-style.html
    code-overflow: wrap
    toc-title: "Inhalt"
    number-sections: false
    highlight-style: github
    theme:
      light: cerulean
      dark: [lumen, css/theme-dark.scss]
    code-copy: true
    css: css/styles.css
    toc: true
    link-external-icon: false
    link-external-newwindow: true
