      .thin { stroke: #69889f; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #69889f; stroke-width: 3; fill: none; stroke-dasharray: 9 10; }
      .green { fill: #7db56d; }
      .red { fill: #c0392b; }
      .orange { fill: #e6a03a; }
      .cyan { fill: #5fb4d9; }
      .lightblue { fill: #eaf5fd; }
      .lightgreen { fill: #edf7e8; }
      .warm { fill: #fff3df; }
