xt><rect class="card" x="1040" y="475" width="250" height="220" rx="22"/><circle cx="1085" cy="515" r="30" fill="#073c66"/><text class="label" x="1165" y="590" text-anchor="middle">Plausibilität</text><text class="small" x="1165" y="635" text-anchor="middle">Tagesgang prüfen</text><path d="M158 505 L158 525 M145 515 L171 515" stroke="white" stroke-width="5"/><text class="num" x="465" y="531" text-anchor="middle">u</text><path d="M770 505 L800 535 M800 505 L770 535" stroke="white" stroke-width="5"/><path d="M1085 525 C1095 500, 1120 540, 1135 510" stroke="white" stroke-width="5" fill="none"/><text class="tiny" x="110" y="790">Prüfung bedeutet hier: Daten in fachliche Rollen übersetzen, bevor Methoden angewendet werden.</text>
