<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a2840" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="bluebar" x1="0" x2="1">
      <stop offset="0" stop-color="#083b63"/>
      <stop offset="1" stop-color="#0e5f90"/>
    </linearGradient>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #102434; }
      .h { font: 700 34px Arial, sans-serif; fill: #15334a; }
      .m { font: 400 26px Arial, sans-serif; fill: #243746; }
      .s { font: 400 22px Arial, sans-serif; fill: #3d4d5b; }
      .tiny { font: 400 18px Arial, sans-serif; fill: #50606c; }
      .card { fill: #ffffff; stroke: #9bb4c7; stroke-width: 2.2; filter: url(#shadow); }
      .card2 { fill: #f7fbff; stroke: #9bb4c7; stroke-width: 2.2; filter: url(#shadow); }
      .blue { fill: #0a4d78; }
      .line { stroke: #0a4d78; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #69889f; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #69889f; stroke-width: 3; fill: none; stroke-dasharray: 9 10; }
      .green { fill: #7db56d; }
      .red { fill: #c0392b; }
      .orange { fill: #e6a03a; }
      .cyan { fill: #5fb4d9; }
      .lightblue { fill: #eaf5fd; }
      .lightgreen { fill: #edf7e8; }
      .warm { fill: #fff3df; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
<text x="90" y="90" class="title">Materialpaket: direkter Einstieg und vertiefende Technik</text>
<rect x="90" y="150" width="430" height="520" rx="28" class="card"/>
<circle cx="150" cy="220" r="42" class="blue"/>
<text x="138" y="236" font-family="Arial" font-size="42" font-weight="700" fill="#fff">1</text>
<text x="220" y="215" class="h">Sofort nutzen</text>
<text x="125" y="285" class="m">fertiges Köln-Paket</text>
<text x="125" y="330" class="s">RGB-Luftbild</text>
<text x="125" y="370" class="s">LST-hot-Karte</text>
<text x="125" y="410" class="s">Folienvorlage</text>
<text x="125" y="450" class="s">QGIS-Projekt</text>
<rect x="145" y="505" width="315" height="90" rx="16" fill="#e8f3fb" stroke="#9bb4c7" stroke-width="2"/>
<text x="175" y="560" class="m">Download starten</text>

<rect x="585" y="150" width="430" height="520" rx="28" class="card"/>
<circle cx="645" cy="220" r="42" class="blue"/>
<text x="633" y="236" font-family="Arial" font-size="42" font-weight="700" fill="#fff">2</text>
<text x="715" y="215" class="h">Unterricht</text>
<text x="620" y="285" class="m">Luftbild lesen</text>
<text x="620" y="330" class="s">Flächen markieren</text>
<text x="620" y="370" class="s">Folie übertragen</text>
<text x="620" y="410" class="s">LST vergleichen</text>
<text x="620" y="450" class="s">Muster begründen</text>
<path d="M650 540 L945 540" class="line"/>
<path d="M910 510 L950 540 L910 570" class="line"/>

<rect x="1080" y="150" width="430" height="520" rx="28" class="card"/>
<circle cx="1140" cy="220" r="42" class="blue"/>
<text x="1128" y="236" font-family="Arial" font-size="42" font-weight="700" fill="#fff">3</text>
<text x="1210" y="215" class="h">Eigene Pakete</text>
<text x="1115" y="285" class="m">Konfigurator</text>
<text x="1115" y="330" class="s">AOI und Zeitraum</text>
<text x="1115" y="370" class="s">hot / cold / both</text>
<text x="1115" y="410" class="s">RGB-WMS / lokal</text>
<text x="1115" y="450" class="s">R-Skript und QGIS</text>
<rect x="1140" y="505" width="315" height="90" rx="16" fill="#fff3df" stroke="#d9a85d" stroke-width="2"/>
<text x="1180" y="560" class="m">Vertiefung</text>

<path d="M520 405 L585 405" class="line"/>
<path d="M1015 405 L1080 405" class="line"/>

</svg>