<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0a2840" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="bluebar" x1="0" x2="1">
      <stop offset="0" stop-color="#083b63"/>
      <stop offset="1" stop-color="#0e5f90"/>
    </linearGradient>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #102434; }
      .h { font: 700 34px Arial, sans-serif; fill: #15334a; }
      .m { font: 400 26px Arial, sans-serif; fill: #243746; }
      .s { font: 400 22px Arial, sans-serif; fill: #3d4d5b; }
      .tiny { font: 400 18px Arial, sans-serif; fill: #50606c; }
      .card { fill: #ffffff; stroke: #9bb4c7; stroke-width: 2.2; filter: url(#shadow); }
      .card2 { fill: #f7fbff; stroke: #9bb4c7; stroke-width: 2.2; filter: url(#shadow); }
      .blue { fill: #0a4d78; }
      .line { stroke: #0a4d78; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #69889f; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke: #69889f; stroke-width: 3; fill: none; stroke-dasharray: 9 10; }
      .green { fill: #7db56d; }
      .red { fill: #c0392b; }
      .orange { fill: #e6a03a; }
      .cyan { fill: #5fb4d9; }
      .lightblue { fill: #eaf5fd; }
      .lightgreen { fill: #edf7e8; }
      .warm { fill: #fff3df; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  
<text x="90" y="90" class="title">Vom Sehen zum Erklären</text>
<text x="90" y="135" class="m">Eine gute Antwort verbindet Beobachtung, Temperaturzuordnung und Prozess.</text>
<rect x="120" y="220" width="300" height="300" rx="26" class="card"/>
<circle cx="180" cy="280" r="38" class="blue"/><text x="168" y="295" font-family="Arial" font-size="36" font-weight="700" fill="#fff">1</text>
<text x="210" y="285" class="h">Beobachten</text>
<text x="160" y="355" class="s">Im Luftbild erkennen wir …</text>
<text x="160" y="400" class="s">Die Fläche ist …</text>

<rect x="485" y="220" width="300" height="300" rx="26" class="card"/>
<circle cx="545" cy="280" r="38" class="blue"/><text x="533" y="295" font-family="Arial" font-size="36" font-weight="700" fill="#fff">2</text>
<text x="575" y="285" class="h">Zuordnen</text>
<text x="525" y="355" class="s">Auf der LST-Karte ist sie …</text>
<text x="525" y="400" class="s">kühl / mittel / heiß</text>

<rect x="850" y="220" width="300" height="300" rx="26" class="card"/>
<circle cx="910" cy="280" r="38" class="blue"/><text x="898" y="295" font-family="Arial" font-size="36" font-weight="700" fill="#fff">3</text>
<text x="940" y="285" class="h">Vergleichen</text>
<text x="890" y="355" class="s">Ähnliche Flächen zeigen …</text>
<text x="890" y="400" class="s">Unterschiede liegen bei …</text>

<rect x="1215" y="220" width="300" height="300" rx="26" class="card"/>
<circle cx="1275" cy="280" r="38" class="blue"/><text x="1263" y="295" font-family="Arial" font-size="36" font-weight="700" fill="#fff">4</text>
<text x="1305" y="285" class="h">Erklären</text>
<text x="1255" y="355" class="s">Plausibel ist …</text>
<text x="1255" y="400" class="s">weil …</text>

<path d="M420 370 L485 370 M785 370 L850 370 M1150 370 L1215 370" class="line"/>
<rect x="260" y="630" width="1080" height="130" rx="24" fill="#eaf5fd" stroke="#9bb4c7" stroke-width="2"/>
<text x="310" y="700" class="m">Nicht: „Die Luft ist dort heiß.“  Sondern: „Die Oberfläche erscheint in dieser Szene wärmer.“</text>

</svg>